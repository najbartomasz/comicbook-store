sonar.projectKey=comicbook-store
sonar.projectName=comicbook-store
sonar.projectVersion=0.0

sonar.sources=\
    apps/

sonar.tests=\
    apps/

sonar.test.inclusions=\
    **/*.spec.ts

sonar.ts.eslint.configPath=.eslintrc.json

sonar.typescript.lcov.reportPaths=\
    coverage/apps/gui/client/lcov.info

sonar.coverage.exclusions=\
    apps/gui/client/src/main.ts,\
    apps/gui/client/test/**,\
    apps/gui/client/src/app/infrastructure/ui/http-client/in-memory-web-api/*
sonar.exclusions=\
    **/jest.config.ts,\
    **/*-e2e/**,\
    **/jest.test-setup.ts,\
    **/jest.global-setup.ts
