<div class="backdrop" data-testid="dynamic-sliding-panel-backdrop"></div>
<div class="panel" [@slide]="animationState()" (@slide.done)="onSlideAnimationDone($event)" data-testid="dynamic-sliding-panel">
    <div class="header">
        <h3>Add new comicbook category item</h3>
        <button class="close-button" (click)="onPanelClose()">X</button>
    </div>
    <div class="content" data-testid="dynamic-sliding-panel-content">
        <ng-container #panelContent />
    </div>
</div>
