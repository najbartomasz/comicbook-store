<div class="container">
    <form class="add-item-form" [formGroup]="newCategoryItemForm" (ngSubmit)="onSubmit()" data-testid="dynamic-add-new-category-form">
        <label for="categoryName" class="form-label">Category Name:</label>
        <input formControlName="categoryName" class="form-text-input" type="text" #categoryName />
        <button class="button submit-button" type="submit">Submit</button>
    </form>
</div>
