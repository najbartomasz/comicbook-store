<div class="branding-list-container">
    <mat-grid-list class="branding-list" cols="3" rowHeight="6:2" gutterSize="10px">
        @for (branding of brandings(); track branding.name) {
            <mat-grid-tile class="branding" data-testid="branding" [routerLink]="['/comicbooks', branding.id]">
                {{ branding.name }}
            </mat-grid-tile>
        }
    </mat-grid-list>
</div>
